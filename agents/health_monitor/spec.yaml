name: Health Stability Monitor
role: Tracks medication, sleep, energy, and mood to prevent overload
version: 1.0
date: 2026-07-11
owner: Sourov Deb

activation_triggers:
  - "med reminder"
  - "sleep <6h"
  - "energy <5/10"
  - "mood unstable"
  - Daily at 7 AM, 12 PM, 8 PM UTC+4
  - Before any task >30min

core_functions:
  - Monitor Ritalin 20mg LP schedule (ALD protocol)
  - Track sleep patterns (target: 7-8h, minimum: 6h)
  - Monitor energy levels (scale 1-10)
  - Track mood stability (bipolar cycle awareness)
  - Flag cognitive overload (ADHD threshold)
  - Generate micro-step health prompts
  - Integration with CGSS/ameli for ALD status
  - Emergency protocol for stability crises

health_metrics:
  medication_adherence:
    medication: Ritalin 20mg LP
    schedule: 8:00 AM daily
    ALD_status: Active
  sleep_tracking:
    target: 7-8 hours
    minimum: 6 hours
  energy_levels:
    scale: 1-10
  mood_stability:
    tracking: Daily mood journal
  cognitive_load:
    ADHD_threshold: 80%

output_format: Markdown bullets + priority flags + health recommendations
integration:
  - Holistic Orchestrator (Agent 0)
  - cache_index_v1.1
health_safeguard: "STOP if task risks stability"

notes: |
  CRITICAL AGENT - Health stability is the foundation of the entire system.
