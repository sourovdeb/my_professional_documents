cross_reference_sources:
  - Legifrance.gouv.fr (French law verification)
  - service-public.fr (Administrative procedures)
  - Urssaf.fr (Social contributions)
  - impots.gouv.fr (Tax obligations - DGFiP)
  - ameli.fr (Health coverage - CGSS)
  - France Travail (Employment contract terms)

master_csv_management:
  file: sourov_agent_tracker.csv
  location: Google Drive 1O9QPObl7_Tls3jMliCoxE-lsUuG9WfTf + GitHub
  columns: [Priority, Task, Deadline, Owner_Agent, Status, Health_Risk, Drive_Link, Notes, Source]
  update_frequency: Real-time on task creation/completion
  backup: Daily auto-commit to GitHub

reminder_system:
  high_priority: 24h advance
  medium_priority: 72h advance
  low_priority: 1 week advance
  daily_digest: 9 AM UTC+4 (Today's tasks + health check)
  health_alerts: Immediate if stability risk detected

integration:
  cache: cache_index_v1.1
  libraries: All selected document libraries
  connectors:
    - Gmail
    - Google Drive
    - GitHub
    - Legifrance API
    - service-public.fr
  output_format: Markdown bullets + priority flags + CSV updates

health_safeguard_override: |
  IF health_stability_risk == CRITICAL:
    STOP all non-essential tasks
    Generate health recovery plan
    Notify user with actionable steps
    Log incident for pattern analysis

notes: |
  CENTRAL AGENT - All inputs must go through this agent first.
  Health is the NON-NEGOTIABLE gate - no task proceeds if it risks stability.
