<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
body { width: 380px; height: 100vh; display: flex; flex-direction: column; background: #0f0f0f; color: #e0e0e0; }
#header { padding: 10px 12px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 8px; }
#header h1 { font-size: 13px; font-weight: 600; color: #a78bfa; }
#status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
#chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 92%; padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.user { align-self: flex-end; background: #1d4ed8; color: white; }
.ai { align-self: flex-start; background: #1e1e2e; border: 1px solid #333; color: #e0e0e0; }
.error { align-self: flex-start; background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; }
.system-msg { align-self: center; font-size: 11px; color: #555; font-style: italic; }
#input-area { padding: 10px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 6px; }
#user-input { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 12px; resize: none; height: 60px; }
#user-input:focus { outline: none; border-color: #a78bfa; }
#btn-row { display: flex; gap: 6px; }
.btn { padding: 6px 12px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: 500; }
#btn-send { background: #6d28d9; color: white; flex: 1; }
#btn-send:hover { background: #7c3aed; }
#btn-page { background: #1e3a5f; color: #93c5fd; }
#btn-clear { background: #1a1a1a; color: #6b7280; border: 1px solid #333; }
#btn-settings { background: #1a1a1a; color: #6b7280; border: 1px solid #333; }
#settings-panel { display: none; padding: 10px; border-top: 1px solid #333; background: #0a0a0a; }
#settings-panel label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 2px; margin-top: 8px; }
#settings-panel select, #settings-panel input, #settings-panel textarea {
  width: 100%; padding: 5px; background: #1a1a1a; border: 1px solid #333;
  border-radius: 4px; color: #e0e0e0; font-size: 11px;
}
#settings-panel textarea { height: 80px; resize: vertical; }
#btn-save-settings { margin-top: 8px; width: 100%; padding: 6px; background: #059669; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
#tasks-bar { display: flex; gap: 4px; padding: 6px 10px; overflow-x: auto; border-bottom: 1px solid #222; }
.task-btn { white-space: nowrap; padding: 3px 8px; font-size: 10px; background: #1e1e2e; border: 1px solid #333; color: #a78bfa; border-radius: 4px; cursor: pointer; }
.task-btn:hover { background: #2d2d4e; }
</style>
</head>
<body>
<div id="header">
  <div id="status-dot"></div>
  <h1>AI Browser Agent</h1>
  <span id="model-label" style="margin-left:auto;font-size:10px;color:#555"></span>
</div>

<div id="tasks-bar">
  <button class="task-btn" data-task="Check script health (schedulerStatus + batchStatus) and report">Health Check</button>
  <button class="task-btn" data-task="Fix line 300 in BATCH_SENDER_v2.gs: delete any text containing 'Page_Down' using Ctrl+H find-replace, then save">Fix Garbage</button>
  <button class="task-btn" data-task="Delete the runAutonomousCampaign trigger in Apps Script Triggers page">Delete Trigger</button>
  <button class="task-btn" data-task="Run sendDrafts function in BATCH_SENDER_v2.gs and report how many drafts were sent">Send Drafts</button>
  <button class="task-btn" data-task="Read current page and summarise what you see in 3 lines">Read Page</button>
</div>

<div id="chat">
  <div class="system-msg">Ready. Select a task or type a command.</div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Type a command or question..."></textarea>
  <div id="btn-row">
    <button class="btn" id="btn-page" title="Inject page context">📄</button>
    <button class="btn" id="btn-clear">Clear</button>
    <button class="btn" id="btn-settings">⚙️</button>
    <button class="btn" id="btn-send">Send</button>
  </div>
</div>

<div id="settings-panel">
  <label>Provider</label>
  <select id="s-provider">
    <option value="ollama">Ollama (local)</option>
    <option value="openai">OpenAI</option>
    <option value="anthropic">Anthropic (Claude)</option>
    <option value="custom">Custom OpenAI-compatible</option>
  </select>
  <label>API URL</label>
  <input id="s-url" placeholder="http://localhost:11434/api/chat">
  <label>API Key (leave blank for Ollama)</label>
  <input id="s-key" type="password" placeholder="sk-...">
  <label>Model</label>
  <input id="s-model" placeholder="llama3.2 / gpt-4o-mini / claude-sonnet-4-6">
  <label>Global Rules (System Prompt)</label>
  <textarea id="s-system" placeholder="Paste your global rule file content here..."></textarea>
  <button id="btn-save-settings">Save Settings</button>
</div>

<script src="panel.js"></script>
</body>
</html>
